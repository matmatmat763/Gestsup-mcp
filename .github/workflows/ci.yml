name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  node:
    name: Node (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  php:
    name: PHP (syntaxe du plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
      - name: Lint des fichiers PHP du plugin
        run: |
          status=0
          for f in plugin/gestsup_mcp/*.php; do
            php -l "$f" || status=1
          done
          exit $status
