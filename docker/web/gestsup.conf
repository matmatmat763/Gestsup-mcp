ServerName localhost

# SERVER_PORT doit refléter le port PHYSIQUE (443 dans le conteneur), pas le
# port du header Host du client (8443 vu de l'hôte). Sinon le contrôle
# « port 443 obligatoire » de l'API GestSup (et du plugin) rejette tout en 403.
UseCanonicalName On
UseCanonicalPhysicalPort On

<Directory /var/www/html>
    AllowOverride All
    Require all granted
</Directory>
